name: Deploy to Production

"on":
  workflow_run:
    workflows: ["Deploy to QA"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  deploy-prod:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Find the release branch
        id: find_release
        run: |
          # Use the branch that triggered the QA workflow
          RELEASE_BRANCH="${{ github.event.workflow_run.head_branch }}"

          if [ -z "$RELEASE_BRANCH" ]; then
            echo "::error::No release branch found from workflow_run context."
            exit 1
          fi

          echo "branch=${RELEASE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "📦 Found release branch: ${RELEASE_BRANCH}"

      - name: Find original PR number
        id: find_pr
        run: |
          git fetch origin "${{ steps.find_release.outputs.branch }}"
          COMMIT_MSG=$(git log "origin/${{ steps.find_release.outputs.branch }}" -1 --pretty=%B)
          PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)

          if [ -n "$PR_NUMBER" ]; then
            echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "📌 Original PR: #${PR_NUMBER}"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Could not find original PR number."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Record current main HEAD for rollback
        id: rollback_point
        run: |
          PREV_SHA=$(git rev-parse HEAD)
          echo "sha=${PREV_SHA}" >> "$GITHUB_OUTPUT"
          echo "🔖 Rollback point: ${PREV_SHA}"

      - name: Merge release branch into main
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RELEASE_BRANCH="${{ steps.find_release.outputs.branch }}"
          git fetch origin "$RELEASE_BRANCH"

          if ! git merge "origin/${RELEASE_BRANCH}" --no-ff -m "Merge ${RELEASE_BRANCH} into main [deploy-prod]"; then
            echo "::error::Merge conflict when merging ${RELEASE_BRANCH} into main."
            if [ "${{ steps.find_pr.outputs.found }}" == "true" ]; then
              gh pr comment "${{ steps.find_pr.outputs.pr_number }}" \
                --body "❌ **Production Deploy Agent Failed**

          Merge conflict when merging \`${RELEASE_BRANCH}\` into \`main\`. Manual intervention required."
            fi
            exit 1
          fi

          git push origin main
          NEW_SHA=$(git rev-parse HEAD)
          echo "sha=${NEW_SHA}" >> "$GITHUB_OUTPUT"
          echo "✅ Merged ${RELEASE_BRANCH} into main at ${NEW_SHA}."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          echo "🚀 Deploying main to production..."
          # -------------------------------------------------------
          # TODO: Replace this section with your actual production
          # deploy commands. Examples:
          #   - kubectl apply -f k8s/prod/
          #   - aws ecs update-service --cluster prod ...
          #   - vercel deploy --prod
          # -------------------------------------------------------
          echo "✅ Production deployment complete."

      - name: Comment success on PR
        if: steps.find_pr.outputs.found == 'true'
        run: |
          RELEASE_BRANCH="${{ steps.find_release.outputs.branch }}"
          DEPLOY_SHA="${{ steps.merge.outputs.sha }}"
          gh pr comment "${{ steps.find_pr.outputs.pr_number }}" \
            --body "🚀 **Deployed to production as ${RELEASE_BRANCH}. Commit: ${DEPLOY_SHA}**

          The release branch has been merged into \`main\` and deployed to production."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rollback on deploy failure
        if: failure() && steps.merge.outcome == 'success'
        run: |
          echo "⚠️ Production deploy failed. Rolling back main to ${{ steps.rollback_point.outputs.sha }}..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git reset --hard "${{ steps.rollback_point.outputs.sha }}"
          git push origin main --force

          if [ "${{ steps.find_pr.outputs.found }}" == "true" ]; then
            gh pr comment "${{ steps.find_pr.outputs.pr_number }}" \
              --body "⚠️ **Production Deploy Agent — Rollback Executed**

          Deployment failed. \`main\` has been rolled back to \`${{ steps.rollback_point.outputs.sha }}\`.

          Please investigate the failure in [Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
